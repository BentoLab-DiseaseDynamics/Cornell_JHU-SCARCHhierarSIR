name: Forecast pipeline

on:
  schedule:
    - cron: '0 12 * * 3'
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  fetch_data:
    uses: ./.github/workflows/fetch-preliminary_NHSN_HRD.yml

  backfill_data:
    needs: fetch_data
    uses: ./.github/workflows/backfill-preliminary_NHSN_HRD.yml

  check_in_season:
    needs: backfill_data
    uses: ./.github/workflows/check-in_season.yml

  run_forecasts:
    needs: check_in_season
    if: needs.check_in_season.outputs.in_season == 'true'
    uses: ./.github/workflows/run-forecasts.yml
  
  submit_forecasts:
    needs: run_forecasts
    uses: ./.github/workflows/submit-forecasts.yml
    secrets: inherit